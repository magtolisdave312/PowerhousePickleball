<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powerhouse Pickleball & Café - Booking</title>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --charcoal: #3A3A3A;
            --dark-charcoal: #2B2B2B;
            --orange: #E47A33;
            --orange-hover: #C96525;
            --cream: #F5F4F0;
            --white: #FFFFFF;
            --light-gray: #E0E0E0;
            --font-heading: 'Arvo', serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--cream);
            color: var(--dark-charcoal);
            line-height: 1.6;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Style */
        .sidebar {
            width: 320px;
            background-color: var(--charcoal);
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            border-right: 6px solid var(--orange);
        }

        .logo-container {
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
            border-radius: 50%;
            overflow: hidden;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sidebar h1 {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--white);
            margin-bottom: 30px;
        }

        .sidebar h1 span {
            color: var(--orange);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        h2 {
            font-family: var(--font-heading);
            color: var(--charcoal);
            text-transform: uppercase;
            margin-bottom: 20px;
            border-bottom: 3px solid var(--orange);
            padding-bottom: 8px;
            display: inline-block;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 0.85rem;
            color: var(--charcoal);
            letter-spacing: 0.5px;
        }

        select, input {
            padding: 12px;
            border: 2px solid var(--light-gray);
            border-radius: 6px;
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--orange);
        }

        /* Resource Selector (2 Courts / Tables) */
        .resource-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 5px;
        }

        .resource-option {
            border: 2px solid var(--light-gray);
            padding: 15px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            background: var(--cream);
        }

        .resource-option:hover {
            border-color: var(--charcoal);
        }

        .resource-option.selected {
            border-color: var(--orange);
            background-color: var(--orange);
            color: var(--white);
        }

        /* Time Slots Responsive Grid */
        .slots-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .time-slot {
            background-color: var(--white);
            border: 2px solid var(--charcoal);
            color: var(--charcoal);
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .time-slot:hover {
            background-color: var(--charcoal);
            color: var(--white);
        }

        .time-slot.selected {
            background-color: var(--orange);
            border-color: var(--orange);
            color: var(--white);
        }

        /* Button & Status */
        .btn {
            background-color: var(--orange);
            color: var(--white);
            font-family: var(--font-heading);
            font-size: 1.1rem;
            text-transform: uppercase;
            padding: 15px 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--orange-hover);
        }

        #status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .success { background-color: #D4EDDA; color: #155724; }
        .error { background-color: #F8D7DA; color: #721C24; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 6px solid var(--orange); }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="logo-container">
            <img src="PHPCLogo.png" alt="Powerhouse Pickleball and Café Logo">
        </div>
        <h1>Powerhouse<br><span>Pickleball & Café</span></h1>
    </div>

    <div class="main-content">
        <div class="card">
            <h2>Reserve Your Spot</h2>
            <form id="booking-form">
                
                <div class="form-group">
                    <label for="booking-type">What are we doing?</label>
                    <select id="booking-type" required>
                        <option value="court">Book a Pickleball Court (₱150/hr)</option>
                        <option value="table">Reserve a Café Table (Free)</option>
                    </select>
                </div>

                <div class="form-group" id="resource-group">
                    <label id="resource-label">Select a Court</label>
                    <div class="resource-container" id="resource-container">
                        </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="booking-date">Select Date</label>
                        <input type="date" id="date-picker" required>
                    </div>
                    <div class="form-group">
                        <label for="user-email">Google Email</label>
                        <input type="email" id="user-email" placeholder="you@gmail.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Available Times (5:00 AM - 11:00 PM)</label>
                    <div class="slots-container" id="slots-container">
                        </div>
                </div>

                <button type="submit" class="btn">Confirm Booking</button>
            </form>
            <div id="status-message"></div>
        </div>
    </div>
</div>

<script>
    // Global configuration variables (Get these from Google Cloud Console)
    const CLIENT_ID = 'YOUR_CLIENT_ID.apps.googleusercontent.com';
    const API_KEY = 'YOUR_API_KEY';
    const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
    const SCOPES = 'https://www.googleapis.com/auth/calendar.events';

    let tokenClient;
    let gapiInited = false;
    let gisInited = false;
    // Initialize GAPI and GIS
    function gapiLoaded() {
        gapi.load('client', async () => {
        await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
        gapiInited = true;
        });
    }
    function gisLoaded() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: '', // defined dynamically during authentication
        });
        gisInited = true;
    }
    // Load scripts safely
    window.addEventListener('load', () => {
        gapiLoaded();
        gisLoaded();
    });
    const bookingTypeSelect = document.getElementById('booking-type');
    const resourceLabel = document.getElementById('resource-label');
    const resourceContainer = document.getElementById('resource-container');
    const slotsContainer = document.getElementById('slots-container');
    
    let selectedResource = null;
    let selectedTime = null;

    const optionsMap = {
        court: { label: "Select a Court", items: ["Court 1", "Court 2"] },
        table: { label: "Select Space", items: ["Indoor Café Table", "Outdoor Patio Table"] }
    };

    // 1. Generate 5:00 AM to 11:00 PM Hourly Slots dynamically
    function generateTimeSlots() {
        slotsContainer.innerHTML = '';
        // Loops from 5 (5 AM) to 22 (10 PM start time, ending at 11 PM)
        for (let hour = 5; hour <= 22; hour++) {
            const timeString = `${hour.toString().padStart(2, '0')}:00`;
            const ampm = hour >= 12 ? 'PM' : 'AM';
            let displayHour = hour % 12;
            if (displayHour === 0) displayHour = 12;
            const displayString = `${displayHour}:00 ${ampm}`;

            const div = document.createElement('div');
            div.className = 'time-slot';
            div.textContent = displayString;
            div.setAttribute('data-time', timeString);

            div.addEventListener('click', () => {
                document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                div.classList.add('selected');
                selectedTime = timeString;
            });

            slotsContainer.appendChild(div);
        }
    }

    // 2. Resource configuration swapping logic
    function updateResourceOptions() {
        const selection = bookingTypeSelect.value;
        const data = optionsMap[selection];
        
        resourceLabel.textContent = data.label;
        resourceContainer.innerHTML = '';
        selectedResource = null;

        data.items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'resource-option';
            div.textContent = item;
            div.addEventListener('click', () => {
                document.querySelectorAll('.resource-option').forEach(opt => opt.classList.remove('selected'));
                div.classList.add('selected');
                selectedResource = item;
            });
            resourceContainer.appendChild(div);
        });
    }

    // Initialize UI on window load
    bookingTypeSelect.addEventListener('change', updateResourceOptions);
    updateResourceOptions();
    generateTimeSlots();

    document.getElementById('date-picker').min = new Date().toISOString().split('T')[0];

    // Form confirmation processing
    document.getElementById('booking-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const type = bookingTypeSelect.value;
        const date = document.getElementById('date-picker').value;
        const email = document.getElementById('user-email').value;
        const status = document.getElementById('status-message');

        if (!selectedResource) {
            status.textContent = `Please select a specific ${type === 'court' ? 'court' : 'table'}!`;
            status.className = "error";
            status.style.display = "block";
            return;
        }

        if (!selectedTime) {
            status.textContent = "Please pick a time slot first!";
            status.className = "error";
            status.style.display = "block";
            return;
        }

        status.textContent = `Confirmed! Your reservation for ${selectedResource} on ${date} at ${selectedTime} has been sent to ${email}.`;
        status.className = "success";
        status.style.display = "block";

        insertGoogleCalendarEvent(type, selectedResource, date, selectedTime, email);
    });

    function insertGoogleCalendarEvent(type, resource, date, time, email) {
        const event = {
            'summary': `PHPC: ${resource} Reservation`,
            'description': `Reservation for a ${type}. Location: Powerhouse Pickleball & Café.`,
            'start': {
                'dateTime': `${date}T${time}:00`,
                'timeZone': 'Asia/Manila'
            },
            'end': {
                'dateTime': `${date}T${parseInt(time.split(':')[0])+1}:${time.split(':')[1]}:00`,
                'timeZone': 'Asia/Manila'
            },
            'attendees': [{'email': email}]
        };
        console.log("Google Calendar payload structured:", event);

        tokenClient.callback = async (resp) => {
            if (resp.error !== undefined) {
                throw (resp);
            }

            try {
                const response = await gapi.client.calendar.events.insert({
                    'calendarId': 'primary', // inserts into the authenticated user's primary calendar
                    'resource': event,
                    'sendUpdates': 'all' // sends email invitation to the guest automatically
                });
                console.log('Event created successfully: ' + response.result.htmlLink);
                document.getElementById('status-message').textContent += " Added to Google Calendar!";
            } catch (err) {
                console.error('Error creating calendar event:', err);
            }
        };

        if (gapi.client.getToken() === null) {
            tokenClient.requestAccessToken({ prompt: 'consent' });
        } else {
            tokenClient.requestAccessToken({ prompt: '' });
        }
    }
</script>
</body>
</html>
